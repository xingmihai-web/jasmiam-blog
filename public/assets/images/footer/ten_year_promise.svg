<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- 进度渐变 -->
    <linearGradient id="progressGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>

    <!-- 背景圆环渐变 -->
    <linearGradient id="trackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e9ecef;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#dee2e6;stop-opacity:0.3" />
    </linearGradient>

    <!-- 阴影 -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景：半透灰 -->
  <rect width="400" height="400" rx="16" fill="rgba(200, 200, 210, 0.45)" stroke="rgba(255, 255, 255, 0.6)" stroke-width="2" filter="url(#shadow)"/>

  <!-- 内边框 -->
  <rect x="8" y="8" width="384" height="384" rx="12" fill="none" stroke="rgba(255, 255, 255, 0.35)" stroke-width="1"/>

  <!-- 标题 -->
  <text x="200" y="48" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', sans-serif" font-size="26" font-weight="bold" fill="#2c3e50">
    十年之约
  </text>

  <!-- 时间范围 -->
  <text x="200" y="74" text-anchor="middle" font-family="'Microsoft YaHei', monospace" font-size="13" fill="#5a6c7d">
    2026.06.14 — 2036.06.14
  </text>

  <!-- 圆形进度条 -->
  <g transform="translate(200, 205)">
    <!-- 背景圆环 -->
    <circle cx="0" cy="0" r="95" fill="none" stroke="rgba(255, 255, 255, 0.4)" stroke-width="16"/>

    <!-- 进度圆环 -->
    <circle id="progressCircle" cx="0" cy="0" r="95" fill="none" stroke="url(#progressGrad)" 
            stroke-width="16" stroke-linecap="round"
            stroke-dasharray="0 596.90" transform="rotate(-90)"/>

    <!-- 中心百分比 -->
    <text id="progressText" x="0" y="-6" text-anchor="middle" font-family="'Microsoft YaHei', monospace" font-size="24" font-weight="bold" fill="#2c3e50">
      0.00%
    </text>
    <text x="0" y="18" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#5a6c7d">
      已完成
    </text>
  </g>

  <!-- 底部统计 -->
  <g transform="translate(0, 330)">
    <!-- 已过去 -->
    <text x="100" y="0" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#5a6c7d">已过去</text>
    <text id="daysElapsed" x="100" y="30" text-anchor="middle" font-family="'Microsoft YaHei', monospace" font-size="24" font-weight="bold" fill="#c0392b">0</text>
    <text x="100" y="48" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#5a6c7d">天</text>

    <!-- 分隔 -->
    <line x1="200" y1="5" x2="200" y2="45" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1"/>

    <!-- 剩余 -->
    <text x="300" y="0" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#5a6c7d">剩余</text>
    <text id="daysRemaining" x="300" y="30" text-anchor="middle" font-family="'Microsoft YaHei', monospace" font-size="24" font-weight="bold" fill="#27ae60">3653</text>
    <text x="300" y="48" text-anchor="middle" font-family="'Microsoft YaHei', sans-serif" font-size="12" fill="#5a6c7d">天</text>
  </g>

  <!-- 当前时间 -->
  <text id="currentTime" x="200" y="395" text-anchor="middle" font-family="'Microsoft YaHei', monospace" font-size="10" fill="#7f8c8d">
    加载中...
  </text>

  <script type="text/javascript">
    <![CDATA[
    function updateProgress() {
      var startDate = new Date("2026-06-14T00:00:00+08:00");
      var endDate = new Date("2036-06-14T00:00:00+08:00");
      var now = new Date();

      var totalMs = endDate - startDate;
      var elapsedMs = now - startDate;
      var remainingMs = endDate - now;

      var progress = Math.max(0, Math.min(100, (elapsedMs / totalMs) * 100));
      var daysElapsed = Math.floor(elapsedMs / (1000 * 60 * 60 * 24));
      var daysRemaining = Math.max(0, Math.floor(remainingMs / (1000 * 60 * 60 * 24)));

      // 圆周长 = 2 * PI * 95 ≈ 596.90
      var circumference = 2 * Math.PI * 95;
      var dashOffset = circumference * (progress / 100);

      document.getElementById("progressCircle").setAttribute("stroke-dasharray", dashOffset + " " + circumference);
      document.getElementById("progressText").textContent = progress.toFixed(4) + "%";
      document.getElementById("daysElapsed").textContent = daysElapsed;
      document.getElementById("daysRemaining").textContent = daysRemaining;

      var timeStr = now.getFullYear() + "-" + 
        String(now.getMonth() + 1).padStart(2, "0") + "-" + 
        String(now.getDate()).padStart(2, "0") + " " + 
        String(now.getHours()).padStart(2, "0") + ":" + 
        String(now.getMinutes()).padStart(2, "0") + ":" + 
        String(now.getSeconds()).padStart(2, "0");
      document.getElementById("currentTime").textContent = timeStr;
    }

    updateProgress();
    setInterval(updateProgress, 1000);
    ]]>
  </script>
</svg>